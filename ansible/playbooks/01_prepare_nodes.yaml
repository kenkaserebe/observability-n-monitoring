# observability-n-monitoring/ansible/playbooks/01_prepare_nodes.yaml
---
- name: Prepare all nodes for k3s installation
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ------------ System Update ------------
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: apt_upgrade

    - name: Reboot if a new kernel was installed
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: apt_upgrade is changed and 'linux-image' in apt_upgrade.stdout

    # ------------ Essential Packages ------------
    - name: Install essential packages
      ansible.builtin.apt:
        name: "{{ essential_packages }}"
        state: present

    # # ------------- Passwordless Sudo -------------
    # - name: Enable passwordless sudo for ansible user
    #   ansible.builtin.copy:
    #     content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL"
    #     dest: "/etc/sudoers.d/{{ ansible_user }}"
    #     validate: visudo -cf %s
    #     mode: '0440'

    # ------------ Swap off ------------
    - name: Disable swap immediately via swapoff
      ansible.builtin.command: swapoff -a
      # when: ansible_swaptotal_mb > 0
      changed_when: false

    - name: Remove swap from /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: Remove swapfile if present
      ansible.builtin.file:
        path: /swapfile
        state: absent

    - name: Mask swapfile systemmd unit (Ubuntu Desktop)
      ansible.builtin.systemd:
        name: swapfile.swap
        masked: yes
        state: stopped
      ignore_errors: true

    # ------------------- Kernel cgroup cleanup (RPI specific) -----------
    - name: Remove legacy cgroup parameters from cmdline.txt (Raspberry Pi)
      ansible.builtin.lineinfile:
        path: /boot/firmware/cmdline.txt
        regexp: ' cgroup_memory=1 cgroup_enable=memory cgroup_enable=cpuset'
        state: absent
      notify: reboot if cmdline changed
      when: ansible_architecture == "aarch64"

    # ------------ Laptop Worker Specific: Disable Sleep ------------
    - name: Mask systemd sleep & suspend targets (laptops)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: yes
        state: stopped
        daemon_reload: yes
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target
      ignore_errors: true
      when: "'laptop' in inventory_hostname"

    - name: Disable GNOME automatic suspend on AC/battery (laptops)
      ansible.builtin.shell:
        if command -v gsettings &> /dev/null; then
          gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type 'nothing';
          gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-battery-type 'nothing';
          gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-timeout 0;
          gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-battery-timeout 0;
        else
          echo "gsettings not found - skipping GNOME power tweaks";
        fi
      become: true
      become_user: "{{ ansible_user }}"
      changed_when: false
      when: "'laptop' in inventory_hostname"

    # ------------ Firewall (UFW) Handling ------------
    - name: Ensure SSH is allowed before enabling firewall
      community.general.ufw:
        rule: allow
        to_port: "{{ ssh_port | default('22') }}"
        proto: tcp

    - name: Configure UFW defaults and enable
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming
        log: yes

    - name: Allow K3s TCP ports
      community.general.ufw:
        rule: allow
        to_port: "{{ item }}"
        proto: tcp
      loop: "{{ k3s_ports_tcp }}"

    - name: Allow Flannel VXLAN UDP port
      community.general.ufw:
        rule: allow
        to_port: "{{ item }}"
        proto: udp
      loop: "{{ k3s_ports_udp }}"

    # ------------ Network Time Sync ------------
    - name: Ensure chrony is installed and running (NTP)
      ansible.builtin.apt:
        name: chrony
        state: present
      
    - name: Start and enable chrony
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: yes

  handlers:
    - name: reboot if cmdline changed
      ansible.builtin.reboot:
        reboot_timeout: 300