---
- name: Fetch kubeconfig from control plane
  hosts: k3s_server[0]
  gather_facts: false

  vars:
    local_kubeconfig_dir: "{{ lookup('env', 'HOME') }}/.kube"
    local_kubeconfig_path: "{{ local_kubeconfig_dir }}/config"

  tasks:
    # ---------- Create local .kube directory ----------
    - name: Ensure local .kube directory exists
      ansible.builtin.file:
        path: "{{ local_kubeconfig_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: false

    # ---------- Fetch kubeconfig from controller1 ----------
    - name: Fetch kubeconfig from controller1
      ansible.builtin.fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ local_kubeconfig_path }}"
        flat: yes
        mode: '0600'

    # ---------- Replace localhost with actual IP ----------
    - name: Replace 127.0.0.1 with controller1 IP
      ansible.builtin.replace:
        path: "{{ local_kubeconfig_path }}"
        regexp: '127\.0\.0\.1'
        replace: "{{ hostvars[inventory_hostname]['ansible_host'] }}"
      delegate_to: localhost
      become: false

    # ---------- Display success message ----------
    - name: Display kubeconfig location
      ansible.builtin.debug:
        msg:
          - "kubeconfig saved to: {{ local_kubeconfig_path }}"
          - "Test with: kubectl get nodes"