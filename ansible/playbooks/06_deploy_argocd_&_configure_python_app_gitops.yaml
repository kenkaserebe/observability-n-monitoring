# observability-n-monitoring/ansible/playbooks/06_deploy_argocd_&_configure_python_app_gitops.yaml

---
- name: Deploy ArgoCD and configure Python app GitOps
  hosts: localhost
  gather_facts: true
  connection: local

  vars:
    argocd_namespace: argocd
    app_namespace: monitoring
    github_repo_url: https://github.com/kenkaserebe/observability-n-monitoring.git
    app_path: kubernetes/python-app

  tasks:
    # ----------------- Create ArgoCD Namespace ------------------------
    - name: Create ArgoCD namespace
      kubernetes.core.k8s:
        kind: Namespace
        name: "{{ argocd_namespace }}"
        state: present

    # ----------------- Install ArgoCD -----------------------
    - name: Install ArgoCD
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('url', 'https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml', split_lines=False) | from_yaml_all | list }}"

    - name: Wait for ArgoCD server pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=argocd-server"
      register: argocd_server_pod
      retries: 30
      delay: 15
      until:
        - argocd_server_pod.resources | length > 0
        - argocd_server_pod.resources[0].status.phase == "Running"

    # ---------------- Get ArgoCD Admin Password ----------------------
    - name: Get ArgoCD initial admin password
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-initial-admin-secret
        namespace: "{{ argocd_namespace }}"
      register: admin_secret

    - name: Set admin password fact
      ansible.builtin.set_fact:
        argocd_admin_password: "{{ admin_secret.resources[0].data.password | b64decode }}"

    - name: Display ArgoCD access info
      ansible.builtin.debug:
        msg:
          - "ArgoCD URL: https://argocd.lan (after Ingress is configured)"
          - "ArgoCD Admin Password: {{ argocd_admin_password }}"
          - "Get CLI password via: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"

    # -------------- Create ArgoCD Ingress -----------------------------
    - name: Create ArgoCD Ingress
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: argocd-server
            namespace: "{{ argocd_namespace }}"
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: web
              traefik.ingress.kubernetes.io/router.middlewares: "{{ argocd_namespace }}-redirect@kubernetescrd"
          spec:
            rules:
              - host: argocd.lan
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: argocd-server
                          port:
                            number: 80

    # ---------------- Patch ArgoCD to work with HTTP (Local Lab) -------------------------
    - name: Disable ArgoCD HTTPS redirect for local HTTP access
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cmd-params-cm
            namespace: "{{ argocd_namespace }}"
            labels:
              app.kubernetes.io/name: argocd-cmd-params-cm
              app.kubernetes.io/part-of: argocd
          data:
            server.insecure: "true"

    - name: Restart ArgoCD server to apply insecure setting
      kubernetes.core.k8s:
        state: patched
        kind: Deployment
        namespace: "{{ argocd_namespace }}"
        name: argocd-server
        definition:
          spec:
            template:
              metadata:
                annotations:
                  restarted-at: "{{ ansible_date_time.iso8601 }}"

    - name: Wait for ArgoCD server to restart
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=argocd-server"
      register: argocd_restart_pod
      retries: 20
      delay: 10
      until:
        - argocd_restart_pod.resources | length > 0
        - argocd_restart_pod.resources[0].status.phase == "Running"
        - argocd_restart_pod.resources[0].status.containerStatuses[0].ready == true

    # ------------------- Install ArgoCD CLI (optional) --------------------
    - name: Check if argocd CLI is installed
      ansible.builtin.command: which argocd
      register: argocd_cli_check
      ignore_errors: true
      changed_when: false

    - name: Install ArgoCD CLI
      ansible.builtin.shell: |
        curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd
        sudo mv argocd /usr/local/bin/
      when: argocd_cli_check.rc != 0

    # -------------------------------- Login to ArgoCD --------------------------------
    - name: Login to ArgoCD CLI
      ansible.builtin.shell: |
        argocd login argocd.lan --username admin --password {{ argocd_admin_password }} --insecure
      changed_when: false
      ignore_errors: true

    # -------------------------- Create ArgoCD Application for Python App --------------------
    - name: Create ArgoCD Application for Python app
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: observability-app
            namespace: "{{ argocd_namespace }}"
          spec:
            project: default
            source:
              repoURL: "{{ github_repo_url }}"
              targetRevision: main
              path: "{{ app_path }}"
            destination:
              server: https://kubernetes.default.svc
              namespace: "{{ app_namespace }}"
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true

    # --------------------- Verity Sync ------------------------------
    - name: Wait for ArgoCD Application to sync
      ansible.builtin.command: >
        kubectl get application observability-app -n {{ argocd_namespace }} -o jsonpath='{.status.sync.status}'
      register: sync_status
      changed_when: false
      retries: 20
      delay: 15
      until: sync_status.stdout == "Synced"

    - name: Verify application is healthy
      ansible.builtin.command: >
        kubectl get application observability-app -n {{ argocd_namespace }} -0 jsonpath='{.status.health.status}'
      register: health_status
      changed_when: false
      retries: 20
      delay: 10
      until: health_status.stdout == "Healthy"

    # ---------------------- Final Output --------------------------------
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: 
          - "============================================================"
          - "ArgoCD deployed successfully"
          - "------------------------------------------------------------"
          - "ArgoCD URL:          http://argocd.lan"
          - "Admin Username:      admin"
          - "Admin Password:      {{ argocd_admin_password }}"
          - ""
          - "Python App URL:      http://app.lan"
          - "------------------------------------------------------------"
          - "Add to /etc/hosts: 192.168.1.15 argocd.lan app.lan"
          - "============================================================"