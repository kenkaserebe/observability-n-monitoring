---
metallb_version: v0.14.5
metallb_ip_pool:
  - 192.168.1.15-192.168.1.35

k3s_ports_tcp:
  - 22    # SSH
  - 6443  # Kubernetes API
  - 2379  # etcd client/peer
  - 2380  # etcd client/peer
  - 10250 # kubelet

k3s_ports_udp:
  - 8472  # Flannel VXLAN

essential_packages:
  - curl
  - wget
  - ca-certificates
  - gnupg
  - lsb-release
  - htop
  - iotop
  - vim
  - apt-transport-https